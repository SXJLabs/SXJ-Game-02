<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0a0a0a;
  border-bottom: 1px solid #333;
}

#title {
  color: cyan;
  font-weight: bold;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="title">SXJ RUNNER</div>
  <div>Score: <span id="score">0</span></div>
</div>

<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes, enemies, bullets, stars;
let score, running;

// ✅ GUARANTEED SPAWN TIMER
let enemyTimer = 0;
let spikeTimer = 0;

// 🚀 START
function startGame() {
  player = { x: 50, y: 400, vy: 0, jumping: false };

  spikes = [];
  enemies = [];
  bullets = [];

  enemyTimer = 0;
  spikeTimer = 0;

  score = 0;
  running = true;

  // stars
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * 400,
      y: Math.random() * 500,
      size: Math.random() * 2
    });
  }
}

// 🦘 JUMP
function jump() {
  if (running && !player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

// 🌌 BACKGROUND
function drawStars() {
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.globalAlpha = Math.random();
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// 🔺 SPIKE
function drawSpike(x) {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(x, 430);
  ctx.lineTo(x + 15, 400);
  ctx.lineTo(x + 30, 430);
  ctx.fill();
}

// 👾 ENEMY
function drawEnemy(e) {
  ctx.fillStyle = "lime";
  ctx.fillRect(e.x, 400, 40, 30);

  ctx.fillStyle = "black";
  ctx.font = "bold 10px Arial";
  ctx.fillText(e.name, e.x + 3, 418);
}

// 🔫 BULLET
function drawBullet(b) {
  ctx.fillStyle = "yellow";
  ctx.fillRect(b.x, b.y, 10, 4);
}

// 🔁 LOOP
function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    drawStars();

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // 🔺 SPIKES (slow spawn)
    spikeTimer++;
    if (spikeTimer > 200) {
      spikes.push({ x: 400 });
      spikeTimer = 0;
    }

    // 👾 ENEMIES (GUARANTEED SPAWN)
    enemyTimer++;
    if (enemyTimer > 180) {
      let name = Math.random() > 0.5 ? "SHAAN" : "RAJEEN";

      enemies.push({
        x: 400,
        name: name,
        shoot: 0
      });

      enemyTimer = 0;
    }

    // 🔺 SPIKES
    for (let s of spikes) {
      s.x -= 3;
      drawSpike(s.x);

      if (s.x < player.x + 25 && s.x + 25 > player.x && player.y > 370) {
        running = false;
      }
    }
    spikes = spikes.filter(s => s.x > -50);

    // 👾 ENEMIES
    for (let e of enemies) {
      e.x -= 2;
      drawEnemy(e);

      // shoot bullets
      e.shoot++;
      if (e.shoot > 30) {
        bullets.push({ x: e.x, y: 410 });
        e.shoot = 0;
      }

      // jump on enemy
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y + 30 < 400 &&
        player.y + 30 > 360
      ) {
        e.dead = true;
        player.vy = -10;
      }

      // hit enemy
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y > 370
      ) {
        running = false;
      }
    }
    enemies = enemies.filter(e => !e.dead && e.x > -50);

    // 🔫 BULLETS
    for (let b of bullets) {
      b.x -= 5;
      drawBullet(b);

      if (
        b.x < player.x + 30 &&
        b.x + 10 > player.x &&
        b.y > player.y &&
        b.y < player.y + 30
      ) {
        running = false;
      }
    }
    bullets = bullets.filter(b => b.x > -10);

    // 🔴 PLAYER
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 5, player.y + 20);

    // score
    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText("GAME OVER", 110, 250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
