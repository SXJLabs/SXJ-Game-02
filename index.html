<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Runner</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow: hidden;
  touch-action: none;
}

/* TOP BAR */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 10;
}

/* CANVAS */
canvas {
  display: block;
  margin: 60px auto 0 auto;
  border: 2px solid white;
  width: 100vw;
  max-width: 400px;
  height: auto;
}

/* CONTROLS */
#controls {
  position: fixed;
  bottom: 35px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
  z-index: 20;
  flex-wrap: wrap;
}

button {
  padding: 16px 18px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: rgba(40,40,40,0.9);
  color: white;
  min-width: 70px;
}
</style>
</head>

<body>

<div id="topbar">
  <div>SXJ RUNNER</div>
  <div>Score: <span id="score">0</span></div>
</div>

<canvas id="game" width="400" height="500"></canvas>

<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="jump()">🦘</button>
  <button onclick="moveRight()">➡️</button>
  <button onclick="toggleShield()">🛡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes, enemies, bullets, stars;
let score = 0;
let running = true;

let timer = 0;
let patternIndex = 0;

let shieldActive = false;

// pattern system
const pattern = ["spike", "enemy", "enemy", "spike"];

// START GAME
function startGame() {
  player = {
    x: 50,
    y: 400,
    vy: 0,
    jumping: false,
    shieldMeter: 100
  };

  spikes = [];
  enemies = [];
  bullets = [];

  score = 0;
  running = true;

  timer = 0;
  patternIndex = 0;

  // stars
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * 400,
      y: Math.random() * 500,
      s: Math.random() * 2
    });
  }
}

// CONTROLS
function jump() {
  if (!player.jumping && running) {
    player.vy = -12;
    player.jumping = true;
  }
}

function moveLeft() {
  player.x -= 20;
}

function moveRight() {
  player.x += 20;
}

function toggleShield() {
  if (player.shieldMeter > 0) {
    shieldActive = !shieldActive;
  }
}

// STARS
function drawStars() {
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.globalAlpha = Math.random();
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
  ctx.globalAlpha = 1;
}

// GAME LOOP
function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    drawStars();

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // shield system
    if (shieldActive) {
      player.shieldMeter -= 0.6;
      if (player.shieldMeter <= 0) {
        player.shieldMeter = 0;
        shieldActive = false;
      }
    } else {
      player.shieldMeter += 0.3;
      if (player.shieldMeter > 100) player.shieldMeter = 100;
    }

    // spawn system
    timer++;
    if (timer > 150) {

      let type = pattern[patternIndex];

      if (type === "spike") {
        spikes.push({ x: 400 });
      }

      if (type === "enemy") {
        enemies.push({
          x: 400,
          name: Math.random() > 0.5 ? "SHAAN" : "RAJEEN",
          shoot: 0
        });
      }

      patternIndex = (patternIndex + 1) % pattern.length;
      timer = 0;
    }

    // SPIKES
    for (let s of spikes) {
      s.x -= 3;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(s.x, 430);
      ctx.lineTo(s.x + 15, 400);
      ctx.lineTo(s.x + 30, 430);
      ctx.fill();

      if (!shieldActive &&
          s.x < player.x + 30 &&
          s.x + 30 > player.x &&
          player.y > 370) {
        running = false;
      }
    }
    spikes = spikes.filter(s => s.x > -50);

    // ENEMIES
    for (let e of enemies) {
      e.x -= 2;

      ctx.fillStyle = "lime";
      ctx.fillRect(e.x, 400, 40, 30);

      ctx.fillStyle = "black";
      ctx.font = "10px Arial";
      ctx.fillText(e.name, e.x + 3, 418);

      // SHAAN shoots only
      if (e.name === "SHAAN") {
        e.shoot++;
        if (e.shoot > 90) {
          bullets.push({ x: e.x, y: 410 });
          e.shoot = 0;
        }
      }

      // jump kill
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y + 30 < 400 &&
        player.y + 30 > 360
      ) {
        e.dead = true;
        player.vy = -10;
      }

      // collision
      if (!shieldActive &&
          player.x < e.x + 40 &&
          player.x + 30 > e.x &&
          player.y > 370) {
        running = false;
      }
    }
    enemies = enemies.filter(e => !e.dead && e.x > -50);

    // BULLETS
    for (let b of bullets) {
      b.x -= 4;

      ctx.fillStyle = "yellow";
      ctx.fillRect(b.x, b.y, 8, 4);

      if (!shieldActive &&
          b.x < player.x + 30 &&
          b.x + 8 > player.x &&
          b.y > player.y &&
          b.y < player.y + 30) {
        running = false;
      }
    }
    bullets = bullets.filter(b => b.x > -10);

    // PLAYER
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 5, player.y + 20);

    // shield glow
    if (shieldActive) {
      ctx.strokeStyle = "cyan";
      ctx.lineWidth = 3;
      ctx.strokeRect(player.x - 4, player.y - 4, 38, 38);
    }

    // shield bar
    ctx.fillStyle = "cyan";
    ctx.fillRect(10, 470, player.shieldMeter * 2, 8);

    // score
    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 100, 250);
  }

  requestAnimationFrame(loop);
}

startGame();
loop();
</script>

</body>
</html>
