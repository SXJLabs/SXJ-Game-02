<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Runner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
}

/* 🎮 CONTROLS */
#controls {
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="topbar">
  <div>SXJ RUNNER</div>
  <div>Score: <span id="score">0</span></div>
</div>

<canvas id="game" width="400" height="500"></canvas>

<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="jump()">🦘</button>
  <button onclick="moveRight()">➡️</button>
  <button onmousedown="shieldOn()" onmouseup="shieldOff()" ontouchstart="shieldOn()" ontouchend="shieldOff()">🛡️ Shield</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes, enemies, bullets, stars;
let score, running;

let spawnTimer = 0;
let patternIndex = 0;

const pattern = ["spike", "enemy", "enemy", "spike"];

function startGame() {
  player = {
    x: 50,
    y: 400,
    vy: 0,
    jumping: false,
    shield: false,
    shieldMeter: 100
  };

  spikes = [];
  enemies = [];
  bullets = [];

  score = 0;
  running = true;

  spawnTimer = 0;
  patternIndex = 0;

  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * 400,
      y: Math.random() * 500,
      size: Math.random() * 2
    });
  }
}

// controls
function jump() {
  if (!player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}
function moveLeft() { player.x -= 20; }
function moveRight() { player.x += 20; }

function shieldOn() {
  if (player.shieldMeter > 0) player.shield = true;
}
function shieldOff() {
  player.shield = false;
}

// stars
function drawStars() {
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.globalAlpha = Math.random();
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// loop
function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    drawStars();

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // shield meter
    if (player.shield) {
      player.shieldMeter -= 0.5;
      if (player.shieldMeter <= 0) {
        player.shield = false;
        player.shieldMeter = 0;
      }
    } else {
      player.shieldMeter += 0.2;
      if (player.shieldMeter > 100) player.shieldMeter = 100;
    }

    // spawn
    spawnTimer++;
    if (spawnTimer > 180) {
      let type = pattern[patternIndex];

      if (type === "spike") spikes.push({ x: 400 });

      if (type === "enemy") {
        let name = Math.random() > 0.5 ? "SHAAN" : "RAJEEN";
        enemies.push({ x: 400, name: name, shoot: 0 });
      }

      patternIndex = (patternIndex + 1) % pattern.length;
      spawnTimer = 0;
    }

    // spikes
    for (let s of spikes) {
      s.x -= 3;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(s.x, 430);
      ctx.lineTo(s.x + 15, 400);
      ctx.lineTo(s.x + 30, 430);
      ctx.fill();

      if (!player.shield && s.x < player.x + 30 && s.x + 30 > player.x && player.y > 370) {
        running = false;
      }
    }

    // enemies
    for (let e of enemies) {
      e.x -= 2;

      ctx.fillStyle = "lime";
      ctx.fillRect(e.x, 400, 40, 30);

      ctx.fillStyle = "black";
      ctx.font = "10px Arial";
      ctx.fillText(e.name, e.x + 3, 418);

      // only SHAAN shoots
      if (e.name === "SHAAN") {
        e.shoot++;
        if (e.shoot > 100) {
          bullets.push({ x: e.x, y: 410 });
          e.shoot = 0;
        }
      }

      // jump kill
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y + 30 < 400 &&
        player.y + 30 > 360
      ) {
        e.dead = true;
        player.vy = -10;
      }

      // collision
      if (!player.shield &&
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y > 370
      ) {
        running = false;
      }
    }

    // bullets
    for (let b of bullets) {
      b.x -= 4;

      ctx.fillStyle = "yellow";
      ctx.fillRect(b.x, b.y, 8, 4);

      if (!player.shield &&
        b.x < player.x + 30 &&
        b.x + 8 > player.x &&
        b.y > player.y &&
        b.y < player.y + 30
      ) {
        running = false;
      }
    }

    // player
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 5, player.y + 20);

    // shield visual
    if (player.shield) {
      ctx.strokeStyle = "cyan";
      ctx.lineWidth = 3;
      ctx.strokeRect(player.x - 3, player.y - 3, 36, 36);
    }

    // shield bar
    ctx.fillStyle = "cyan";
    ctx.fillRect(10, 460, player.shieldMeter * 2, 10);

    // score
    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 100, 250);
  }

  requestAnimationFrame(loop);
}

startGame();
loop();
</script>

</body>
</html>
