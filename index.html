<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Runner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #111;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
}
</style>
</head>

<body>

<div id="topbar">
  <div>SXJ RUNNER</div>
  <div>Score: <span id="score">0</span></div>
</div>

<button onclick="startGame()">Start Game</button>
<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes, enemies, bullets;
let score, running;

let spawnTimer = 0;
let patternIndex = 0;

// 🔁 FIXED PATTERN
const pattern = ["spike", "enemy", "enemy", "spike"];

function startGame() {
  player = { x: 50, y: 400, vy: 0, jumping: false };

  spikes = [];
  enemies = [];
  bullets = [];

  score = 0;
  running = true;

  spawnTimer = 0;
  patternIndex = 0;
}

// 🦘 JUMP
function jump() {
  if (!player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}
document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

// 🔁 LOOP
function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // 🧠 PATTERN SPAWN
    spawnTimer++;

    if (spawnTimer > 140) {
      let type = pattern[patternIndex];

      if (type === "spike") {
        spikes.push({ x: 400 });
      }

      if (type === "enemy") {
        let name = Math.random() > 0.5 ? "SHAAN" : "RAJEEN";

        enemies.push({
          x: 400,
          name: name,
          shoot: 0
        });
      }

      patternIndex++;
      if (patternIndex >= pattern.length) patternIndex = 0;

      spawnTimer = 0;
    }

    // 🔺 SPIKES
    for (let s of spikes) {
      s.x -= 3;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(s.x, 430);
      ctx.lineTo(s.x + 15, 400);
      ctx.lineTo(s.x + 30, 430);
      ctx.fill();

      if (s.x < player.x + 30 && s.x + 30 > player.x && player.y > 370) {
        running = false;
      }
    }
    spikes = spikes.filter(s => s.x > -50);

    // 👾 ENEMIES
    for (let e of enemies) {
      e.x -= 2;

      ctx.fillStyle = "lime";
      ctx.fillRect(e.x, 400, 40, 30);

      ctx.fillStyle = "black";
      ctx.font = "10px Arial";
      ctx.fillText(e.name, e.x + 3, 418);

      // 🔫 SHOOT
      e.shoot++;
      if (e.shoot > 40) {
        bullets.push({ x: e.x, y: 410 });
        e.shoot = 0;
      }

      // jump on head
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y + 30 < 400 &&
        player.y + 30 > 360
      ) {
        e.dead = true;
        player.vy = -10;
      }

      // hit
      if (
        player.x < e.x + 40 &&
        player.x + 30 > e.x &&
        player.y > 370
      ) {
        running = false;
      }
    }
    enemies = enemies.filter(e => !e.dead && e.x > -50);

    // 🔫 BULLETS
    for (let b of bullets) {
      b.x -= 5;

      ctx.fillStyle = "yellow";
      ctx.fillRect(b.x, b.y, 8, 4);

      if (
        b.x < player.x + 30 &&
        b.x + 8 > player.x &&
        b.y > player.y &&
        b.y < player.y + 30
      ) {
        running = false;
      }
    }
    bullets = bullets.filter(b => b.x > -10);

    // 🔴 PLAYER
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 5, player.y + 20);

    // score
    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 100, 250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
