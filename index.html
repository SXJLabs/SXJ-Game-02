<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Score: <span id="score">0</span></h2>
<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes, enemies, bullets, stars;
let score, running, frame;

function startGame() {
  player = { x: 50, y: 400, vy: 0, jumping: false };

  spikes = [];
  enemies = [];
  bullets = [];

  score = 0;
  frame = 0;
  running = true;

  // stars
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * 400,
      y: Math.random() * 500,
      size: Math.random() * 2
    });
  }
}

function jump() {
  if (running && !player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

// 🌌 draw stars
function drawStars() {
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.globalAlpha = Math.random();
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// 🔺 spike
function drawSpike(x, y) {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(x, y + 30);
  ctx.lineTo(x + 15, y);
  ctx.lineTo(x + 30, y + 30);
  ctx.fill();
}

// 👾 enemy
function drawEnemy(e) {
  ctx.fillStyle = "purple";
  ctx.fillRect(e.x, 380, 30, 30);

  ctx.fillStyle = "white";
  ctx.font = "10px Arial";
  ctx.fillText(e.name, e.x, 375);
}

// 🔫 bullet
function drawBullet(b) {
  ctx.fillStyle = "yellow";
  ctx.fillRect(b.x, b.y, 6, 3);
}

function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    frame++;

    // 🌌 background
    drawStars();

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // 🔺 spikes (rare)
    if (frame % 220 === 0) {
      spikes.push({ x: 400 });
    }

    // 👾 enemies (very spaced)
    if (frame % 300 === 0) {
      let name = Math.random() > 0.5 ? "SHAAN" : "RAJEEN";
      enemies.push({ x: 400, name: name, shootTimer: 0 });
    }

    // 🔺 draw spikes
    for (let s of spikes) {
      s.x -= 3;
      drawSpike(s.x, 400);

      if (
        s.x < player.x + 25 &&
        s.x + 25 > player.x &&
        player.y > 370
      ) {
        running = false;
      }
    }

    spikes = spikes.filter(s => s.x > -50);

    // 👾 enemies
    for (let e of enemies) {
      e.x -= 2;

      drawEnemy(e);

      // shooting
      e.shootTimer++;
      if (e.shootTimer % 60 === 0) {
        bullets.push({ x: e.x, y: 395 });
      }

      // jump on enemy (kill)
      if (
        player.x < e.x + 30 &&
        player.x + 30 > e.x &&
        player.y + 30 < 400 &&
        player.y + 30 > 370
      ) {
        e.dead = true;
        player.vy = -10; // bounce
      }

      // collision
      if (
        player.x < e.x + 30 &&
        player.x + 30 > e.x &&
        player.y > 370
      ) {
        running = false;
      }
    }

    enemies = enemies.filter(e => !e.dead && e.x > -50);

    // 🔫 bullets
    for (let b of bullets) {
      b.x -= 5;
      drawBullet(b);

      if (
        b.x < player.x + 30 &&
        b.x + 5 > player.x &&
        b.y > player.y &&
        b.y < player.y + 30
      ) {
        running = false;
      }
    }

    bullets = bullets.filter(b => b.x > -10);

    // 🔴 player
    ctx.fillStyle = "red";
    ctx.fillRect(player.x, player.y, 30, 30);

    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 5, player.y + 20);

    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText("GAME OVER", 110, 250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
