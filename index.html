<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXJ Runner</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    canvas {
      background: #000;
      display: block;
      margin: auto;
      margin-top: 20px;
      border: 2px solid white;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Score: <span id="score">0</span></h2>
<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, running, frame;

function startGame() {
  player = { x: 50, y: 400, vy: 0, jumping: false };
  obstacles = [];
  score = 0;
  frame = 0;
  running = true;
}

function jump() {
  if (running && player && !player.jumping) {
    player.vy = -12;
    player.jumping = true;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

function drawSpike(x, y) {
  ctx.fillStyle = "red";

  ctx.beginPath();
  ctx.moveTo(x, y + 30);
  ctx.lineTo(x + 15, y);
  ctx.lineTo(x + 30, y + 30);
  ctx.closePath();
  ctx.fill();
}

function loop() {
  ctx.clearRect(0, 0, 400, 500);

  if (running && player) {

    frame++;

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if (player.y > 400) {
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // 🟢 EASY SPAWN (one after another, not spam)
    if (frame % 160 === 0) {
      obstacles.push({ x: 400 });
    }

    // player
    ctx.fillStyle = "#00bcd4";
    ctx.fillRect(player.x, player.y, 30, 30);

    // FIXED SXJ TEXT (always visible now)
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.fillText("SXJ", player.x + 4, player.y + 20);

    // spikes instead of boxes
    for (let i = 0; i < obstacles.length; i++) {
      let o = obstacles[i];
      o.x -= 3; // slower = easier

      drawSpike(o.x, 400);

      // collision (fair hitbox for spike)
      if (
        o.x < player.x + 25 &&
        o.x + 25 > player.x &&
        player.y > 370
      ) {
        running = false;
      }
    }

    obstacles = obstacles.filter(o => o.x > -50);

    score++;
    document.getElementById("score").innerText = score;

  } else {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 110, 250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
